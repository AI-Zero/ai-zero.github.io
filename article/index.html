<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }
    .logo .open { color: #2296F3; }
    .logo .wire { color: #E84A2B; }

    .article-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .article-meta {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    .btn-primary {
      display: block;
      background: #2296F3;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      padding: 16px 24px;
      border-radius: 14px;
      margin-bottom: 14px;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-secondary {
      display: block;
      color: #888;
      text-decoration: none;
      font-size: 15px;
      padding: 12px 24px;
      border-radius: 14px;
      border: 1px solid #333;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: #666; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="open">Open</span><span class="wire">Wire</span></div>
    <div class="article-title" id="title">Loading…</div>
    <div class="article-meta" id="meta"></div>
    <a class="btn-primary" href="https://apps.apple.com/app/id6758412540" id="appstore-link">
      Get OpenWire — Free
    </a>
    <a class="btn-secondary" href="#" id="article-link">
      Continue to article →
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get("title") || "Article";
    const source = params.get("source") || "";
    const articleURL = params.get("url") || "#";
    const date = params.get("date") ? new Date(params.get("date")).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "";

    document.getElementById("title").textContent = title;
    document.getElementById("meta").textContent = [source, date].filter(Boolean).join(" · ");
    document.getElementById("article-link").href = articleURL;
    document.title = title + " — OpenWire";
  </script>
</body>
</html>
